<svg width="347" height="456" viewBox="0 0 347 456" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Codex Usage Tray popup with Codex and Spark usage gauges">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="347" y2="456" gradientUnits="userSpaceOnUse">
      <stop stop-color="#14172B"/>
      <stop offset="1" stop-color="#1D2140"/>
    </linearGradient>
    <linearGradient id="blue" x1="42" y1="105" x2="137" y2="204" gradientUnits="userSpaceOnUse">
      <stop stop-color="#44A1FF"/>
      <stop offset="1" stop-color="#62CAFF"/>
    </linearGradient>
    <linearGradient id="purple" x1="212" y1="105" x2="304" y2="204" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4BA8FF"/>
      <stop offset="1" stop-color="#8B6CFF"/>
    </linearGradient>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#000" flood-opacity="0.22"/>
    </filter>
    <style>
      .title{font:700 17px 'Segoe UI',Arial,sans-serif;fill:#F8FAFF}.sub{font:400 12px 'Segoe UI',Arial,sans-serif;fill:#9FB0D3}.label{font:700 13px 'Segoe UI',Arial,sans-serif;fill:#F6F8FF}.percent{font:700 26px 'Segoe UI',Arial,sans-serif;fill:#F8FAFF}.time{font:500 13px 'Segoe UI',Arial,sans-serif;fill:#AAB8DC}.card{fill:#202442;stroke:#48527E;stroke-width:1.1}.track{stroke:#3B426A;stroke-width:6;stroke-linecap:round}.pin{fill:#4EA2FF}
    </style>
  </defs>
  <rect x="0.5" y="0.5" width="346" height="455" rx="8" fill="url(#bg)" stroke="#304A78"/>
  <text class="title" x="13" y="25">Codex Usage</text>
  <text class="sub" x="13" y="39">Codex rate limit</text>
  <circle class="pin" cx="326" cy="20" r="9"/><path d="M323 14.5h6M325 15v5.5M327 15v5.5M322 20.5h8M326 20.5v6" stroke="#F7FBFF" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="13" y1="49" x2="335" y2="49" stroke="#2F65A3" stroke-width="1"/>

  <g filter="url(#softShadow)">
    <rect class="card" x="11" y="66" width="157" height="181" rx="10"/>
    <text class="label" x="28" y="88">5h</text>
    <circle class="track" cx="88" cy="155" r="50"/>
    <circle cx="88" cy="155" r="50" stroke="url(#blue)" stroke-width="6" stroke-linecap="round" pathLength="100" stroke-dasharray="51 100" transform="rotate(-90 88 155)"/>
    <text class="percent" x="88" y="164" text-anchor="middle">51%</text>
    <text class="time" x="88" y="228" text-anchor="middle">1h 23m</text>
  </g>

  <g filter="url(#softShadow)">
    <rect class="card" x="180" y="66" width="157" height="181" rx="10"/>
    <text class="label" x="197" y="88">1w</text>
    <circle class="track" cx="257" cy="155" r="50"/>
    <circle cx="257" cy="155" r="50" stroke="url(#purple)" stroke-width="6" stroke-linecap="round" pathLength="100" stroke-dasharray="23 100" transform="rotate(-90 257 155)"/>
    <text class="percent" x="257" y="164" text-anchor="middle">23%</text>
    <text class="time" x="257" y="228" text-anchor="middle">5d 6h</text>
  </g>

  <g filter="url(#softShadow)">
    <rect class="card" x="11" y="261" width="157" height="181" rx="10"/>
    <text class="label" x="28" y="283">Spark 5h</text>
    <circle class="track" cx="88" cy="350" r="50"/>
    <circle cx="88" cy="350" r="50" stroke="url(#blue)" stroke-width="6" stroke-linecap="round" pathLength="100" stroke-dasharray="100 100" transform="rotate(-90 88 350)"/>
    <text class="percent" x="88" y="359" text-anchor="middle">100%</text>
    <text class="time" x="88" y="423" text-anchor="middle">4h 59m</text>
  </g>

  <g filter="url(#softShadow)">
    <rect class="card" x="180" y="261" width="157" height="181" rx="10"/>
    <text class="label" x="197" y="283">Spark 1w</text>
    <circle class="track" cx="257" cy="350" r="50"/>
    <circle cx="257" cy="350" r="50" stroke="url(#blue)" stroke-width="6" stroke-linecap="round" pathLength="100" stroke-dasharray="99 100" transform="rotate(-90 257 350)"/>
    <text class="percent" x="257" y="359" text-anchor="middle">99%</text>
    <text class="time" x="257" y="423" text-anchor="middle">6d 7h</text>
  </g>
</svg>